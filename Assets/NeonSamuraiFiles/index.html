<!DOCTYPE html>

<head>
    <link rel="stylesheet" href="CSS/style.css">
    <title> Neon Samurai </title>
</head>

<body>
    <div class="mainWrapper">
        <canvas id="player" width="1000px" height="600px"> </canvas>
        <div id="Level" class="gameLevel"> </div>
        <div id="obstacle" class="gameObstacle"> </div>
        <div id="tallObstacle" class="tallGameObstacle"> </div>
        <div id="heightCeiling" class="heightCeiling"> </div>

        <h2 id="score" class="score"> Score: 0 </h2>
        <h3 class="instructTxt"> Press & Hold Space Key To Jump! </h3>

        <h4 id="10" class="scoreRating C"> NOT BAD </h4>
        <h4 id="20" class="scoreRating U"> IMPRESSIVE </h4>
        <h4 id="30" class="scoreRating R"> AMAZING </h4>
        <h4 id="40" class="scoreRating E"> EPIC </h4>
        <h4 id="50" class="scoreRating L"> LEGENDARY </h4>
        <h4 id="60" class="scoreRating M"> MYTHICAL </h4>
        <h4 id="70" class="scoreRating G"> GODLY </h4>
        <h4 id="80" class="scoreRating UN"> UNFATHOMABLE </h4>
        <h4 id="90" class="scoreRating WTF"> W T F ! </h4>

        <h4 class="gameTitle"> Neon Samurai </h4>
    </div>

    <script src="JS/script.js"> </script>
</body>
