<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="CSS/style.css">

    <title>Wiebe's Work Warehouse</title>

<body>
    <div class="mainWrapper">
        <div class="container-fluid vh-100">                        <!-- Makes the container fill the screen -->
            <div class="row h-100 justify-content-end align-items-start">

                <div class="col-auto">
                    <div class="homeButton">
                        <a href="index.html" class="btn">

                </div>

                <div class="col-auto">

                        </a>
                    </div>
                </div>
                
                <div class="col-auto">
                    <div class="contactButton">
                        <a href="contact.html" class="btn">
                            <img src="Assets\Icons\Contact\icons8-phone-50.png" alt="Contact">
                        </a>
                    </div>
                </div>

                <div class="col-12">
                    <div class="row justify-content-center align-items-start">
                        <div class="uiDivider"> </div>

                    </div>
                </div>


                <div class="row justify-content-center align-items-start">
                    <div class="col-md-8 text-center">

                                <h1 class="display-1">HELLO THERE</h1>
                            </div>
            
                            <div class="textBlockContainer">
                                <p class="nameText">

                                    A prospective game developer! I specialize in;
                                </p>

                                    <div class="col-auto">
                                        <div class="textBlockA">Mechanics Programming</div>
                                    </div>
            
                                    <div class="col-auto">
                                        <div class="textBlockB">Game Design</div>
                                    </div>
            
                                    <div class="col-auto">
                                        <div class="textBlockC">Backend Programming</div>
                                    </div>
                                </div>
                            </div>
            
                            <div class="playZoneButton mt-4">
                                <div class="d-inline-block" tabindex="0" data-bs-toggle="popover" data-bs-trigger="hover focus" data-bs-content="To My Projects Page">
                                    <a href="warehouse.html" class="btn btn-warning btn-lg">
                                        <div class="playZoneBtnText">
                                            The Warehouse
                                        </div>
                                    </a>
                                </div>
                            </div>
                            
                        </div>
        
                    </div>
                </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
    <script>const popoverTriggerList = document.querySelectorAll('[data-bs-toggle="popover"]');
    const popoverList = [...popoverTriggerList].map(popoverTriggerEl => new bootstrap.Popover(popoverTriggerEl));</script>

    <script src="Assets\matter-js-master\build\matter.js"> </script>
